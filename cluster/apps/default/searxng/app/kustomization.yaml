---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./helm-release.yaml
  - ./secret.yaml
configMapGenerator:
  - name: searxng-configmap
    files:
      - settings.yml=./config/settings.yml
      - limiter.toml=./config/limiter.toml
generatorOptions:
  disableNameSuffixHash: true
