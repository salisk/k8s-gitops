---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dawarich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: dawarich-secret
        containers:
          app:
            image:
              repository: docker.io/freikin/dawarich
              tag: 1.7.8
            command: ["web-entrypoint.sh"]
            args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
            env: &env
              APPLICATION_HOSTS: "dawarich.${SECRET_DOMAIN}"
              APPLICATION_PROTOCOL: http
              BACKGROUND_PROCESSING_CONCURRENCY: "10"
              DISTANCE_UNIT: km
              MIN_MINUTES_SPENT_IN_CITY: 60
              RAILS_ENV: production
              REDIS_URL: redis://dragonfly.data.svc.cluster.local:6379
              SELF_HOSTED: "true"
              TIME_ZONE: "${TIMEZONE}"
              TZ: "${TIMEZONE}"
              DISABLE_TELEMETRY: "true"
              OIDC_ISSUER: "https://sso.${SECRET_DOMAIN}/application/o/dawarich/"
              OIDC_REDIRECT_URI: "https://dawarich.${SECRET_DOMAIN}/users/auth/openid_connect/callback"
              OIDC_CLIENT_ID: "${DAWARICH_OIDC_CLIENT_ID}"
              OIDC_CLIENT_SECRET: "${DAWARICH_OIDC_CLIENT_SECRET}"
              OIDC_PROVIDER_NAME: "Sign in with Authentik"
              OIDC_AUTO_REGISTER: "true"
              ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
              ALLOW_EMAIL_PASSWORD_LOGIN: "false"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: &port 3000
                    scheme: HTTP
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 4
              readiness: *probes
              startup:
                enabled: false
            securityContext: &sc
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
          sidekiq:
            image:
              repository: docker.io/freikin/dawarich
              tag: 1.7.8
            command: ["sidekiq-entrypoint.sh"]
            env: *env
            envFrom: *envFrom
            securityContext: *sc
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: dawarich
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: Dawarich
          gethomepage.dev/description: Location history tracker
          gethomepage.dev/icon: dawarich
        hostnames:
          - "dawarich.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      data:
        existingClaim: dawarich
        advancedMounts:
          dawarich:
            app: &mounts
              - path: /var/app/public
                subPath: public
              - path: /var/app/storage
                subPath: storage
            sidekiq: *mounts
      watched:
        type: emptyDir
        sizeLimit: 1Gi
        advancedMounts:
          dawarich:
            app: &watched
              - path: /var/app/tmp/imports/watched
            sidekiq: *watched
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          dawarich:
            app: &tmp
              - path: /var/app/tmp
                subPath: app
            sidekiq: *tmp
