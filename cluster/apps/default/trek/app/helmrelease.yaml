---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trek
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      trek:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mauriceboe/trek
              tag: 3.4.1
            args:
              - sh
              - -c
              - cd /app/server && exec node --require tsconfig-paths/register dist/index.js
            env:
              NODE_ENV: production
              PORT: &port 3000
              TZ: ${TIMEZONE}
              APP_URL: https://trek.${SECRET_DOMAIN}
              ALLOWED_ORIGINS: https://trek.${SECRET_DOMAIN}
              TRUST_PROXY: "1"
              FORCE_HTTPS: "true"
              LOG_LEVEL: info
              # OIDC / Authentik
              OIDC_ONLY: "true"
              OIDC_ISSUER: https://sso.${SECRET_DOMAIN}/application/o/trek/
              OIDC_DISCOVERY_URL: https://sso.${SECRET_DOMAIN}/application/o/trek/.well-known/openid-configuration
              OIDC_DISPLAY_NAME: Authentik
              OIDC_ADMIN_CLAIM: groups
              OIDC_ADMIN_VALUE: admins
              OIDC_SCOPE: openid email profile groups
            envFrom:
              - secretRef:
                  name: trek-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 40
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Travel
          gethomepage.dev/name: TREK
          gethomepage.dev/icon: mdi-airplane
          gethomepage.dev/description: Travel planner
        hostnames:
          - "trek.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
    persistence:
      data:
        existingClaim: trek-pvc-v1
        advancedMounts:
          trek:
            app:
              - path: /app/data
                subPath: data
              - path: /app/uploads
                subPath: uploads
