---
apiVersion: v1
kind: Secret
metadata:
  name: kite-secret
  namespace: default
type: Opaque
stringData:
  # App
  JWT_SECRET: "${KITE_JWT_SECRET}"
  KITE_ENCRYPT_KEY: "${KITE_ENCRYPT_KEY}"
  DB_TYPE: postgres
  DB_DSN: |-
    host=postgres-rw.data.svc.cluster.local user=${KITE_POSTGRES_USER} password=${KITE_POSTGRES_PASS} dbname=kite sslmode=disable
  # Postgres Init
  INIT_POSTGRES_DBNAME: kite
  INIT_POSTGRES_HOST: postgres-rw.data.svc.cluster.local
  INIT_POSTGRES_USER: "${KITE_POSTGRES_USER}"
  INIT_POSTGRES_PASS: "${KITE_POSTGRES_PASS}"
  INIT_POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"
---
apiVersion: v1
kind: Secret
metadata:
  name: kite-config
  namespace: default
type: Opaque
stringData:
  # $${VAR} placeholders are expanded by kite at startup from the container env.
  config.yaml: |
    clusters:
      - name: in-cluster
        inCluster: true
        default: true
        prometheusURL: http://vmsingle-vm.monitoring.svc.cluster.local:8428
    oauth:
      - name: authentik
        enabled: true
        clientId: "${KITE_OAUTH_CLIENT_ID}"
        clientSecret: "${KITE_OAUTH_CLIENT_SECRET}"
        issuer: "https://sso.${SECRET_DOMAIN}/application/o/kite/"
        scopes: "openid,profile,email,offline_access"
        usernameClaim: email
        groupsClaim: groups
    rbac:
      roles:
        - name: admin
          description: Full cluster admin
          clusters: ["*"]
          namespaces: ["*"]
          resources: ["*"]
          verbs: ["*"]
      roleMapping:
        - name: admin
          users:
            - "${AUTHENTIK_ADMIN_EMAIL}"
