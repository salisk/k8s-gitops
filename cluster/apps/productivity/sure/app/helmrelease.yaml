---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sure
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      sure:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: sure-secret
          migrate:
            image: &image
              repository: ghcr.io/we-promise/sure
              tag: stable
            command:
              - /bin/sh
              - -c
              - DISABLE_DATABASE_ENVIRONMENT_CHECK=1 bundle exec rake db:prepare
            env: &env
              RAILS_ENV: production
              SELF_HOSTED: "true"
              RAILS_ASSUME_SSL: "true"
              RAILS_FORCE_SSL: "false"
              RAILS_LOG_TO_STDOUT: "true"
              APP_DOMAIN: sure.${SECRET_DOMAIN}
              TZ: ${TIMEZONE}
              REDIS_URL: redis://dragonfly.data.svc.cluster.local:6379/6
              OIDC_ISSUER: https://sso.${SECRET_DOMAIN}/application/o/sure/
              OIDC_REDIRECT_URI: https://sure.${SECRET_DOMAIN}/auth/openid_connect/callback
            envFrom:
              - secretRef:
                  name: sure-secret
        containers:
          app:
            image: *image
            env:
              <<: *env
              PORT: &port "3000"
            envFrom:
              - secretRef:
                  name: sure-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: 3000
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 40
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 384Mi
              limits:
                memory: 1Gi
          worker:
            image: *image
            command:
              - bundle
              - exec
              - sidekiq
            env: *env
            envFrom:
              - secretRef:
                  name: sure-secret
            probes:
              liveness: { enabled: false }
              readiness: { enabled: false }
              startup: { enabled: false }
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 768Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Finance
          gethomepage.dev/name: Sure
          gethomepage.dev/icon: si:money
          gethomepage.dev/description: Self-hosted budgeting
        hostnames:
          - "sure.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3000
    persistence:
      storage:
        existingClaim: sure-pvc-v1
        advancedMounts:
          sure:
            app:
              - path: /rails/storage
            worker:
              - path: /rails/storage
      tmp:
        type: emptyDir
        advancedMounts:
          sure:
            app:
              - path: /tmp
            worker:
              - path: /tmp
