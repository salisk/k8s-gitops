---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
  namespace: ai
data:
  config.yaml: |
    # Hermes Agent configuration
    # Model provider: routed through the existing litellm proxy
    model:
      default: kimi-k2.6
      provider: custom:kubernetes
      base_url: http://litellm.ai.svc.cluster.local:4000/v1
      api_key: ${LITELLM_MASTER_KEY}
    fallback_providers:
      - provider: custom:kubernetes
        model: minimax-m2.7
    providers:
      kubernetes:
        base_url: http://litellm.ai.svc.cluster.local:4000/v1
        api_key: ${LITELLM_MASTER_KEY}
    toolsets:
      - hermes-cli
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    memory:
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    group_sessions_per_user: false
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    web:
      search_backend: searxng
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
      tool_use_enforcement: auto
    # MCP servers are available through the ToolHive gateway
    # Additional individual MCP servers can be added as needed
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway.ai.svc.cluster.local:4483/mcp
