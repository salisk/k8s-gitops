---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secret
  namespace: ai
type: Opaque
stringData:
  # LiteLLM API Key (same master key used by Open WebUI)
  LITELLM_API_KEY: "${LITELLM_MASTER_KEY}"
  # API server bearer token (required when binding to 0.0.0.0)
  API_SERVER_KEY: "${LITELLM_MASTER_KEY}"
  # Dashboard OIDC (Authentik) — public PKCE client, no client_secret needed
  HERMES_DASHBOARD_OIDC_CLIENT_ID: "${HERMES_DASHBOARD_OIDC_CLIENT_ID}"
