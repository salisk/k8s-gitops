---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: ai
type: Opaque
stringData:
  # Postgres Init (creates database and user)
  INIT_POSTGRES_DBNAME: litellm
  INIT_POSTGRES_HOST: postgres-rw.data.svc.cluster.local
  INIT_POSTGRES_USER: litellm
  INIT_POSTGRES_PASS: "${LITELLM_POSTGRES_PASSWORD}"
  INIT_POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"

  # PostgreSQL Connection
  DATABASE_URL: "postgresql://litellm:${LITELLM_POSTGRES_PASSWORD}@postgres-rw.data.svc.cluster.local:5432/litellm?sslmode=disable"

  # LiteLLM Master Key
  LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"

  # OIDC / SSO (Authentik - Generic Provider)
  GENERIC_CLIENT_ID: "${LITELLM_OIDC_CLIENT_ID}"
  GENERIC_CLIENT_SECRET: "${LITELLM_OIDC_CLIENT_SECRET}"
  GENERIC_AUTHORIZATION_ENDPOINT: "https://sso.${SECRET_DOMAIN}/application/o/authorize/"
  GENERIC_TOKEN_ENDPOINT: "https://sso.${SECRET_DOMAIN}/application/o/token/"
  GENERIC_USERINFO_ENDPOINT: "https://sso.${SECRET_DOMAIN}/application/o/userinfo/"
  GENERIC_SCOPE: "openid profile email"
  GENERIC_USER_ROLE_ATTRIBUTE: "litellm_role"
