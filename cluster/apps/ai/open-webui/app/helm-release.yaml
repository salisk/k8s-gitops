---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.5@sha256:e045bde3b004cc7f8c319412345eb56c87ea6ac57031534a31ca37ad5424beb3
            env:
              TZ: ${TIMEZONE}
              WEBUI_URL: "https://chat.${SECRET_DOMAIN}"
              # OIDC / Authentik
              ENABLE_SIGNUP: "false"
              ENABLE_LOGIN_FORM: "false"
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              OAUTH_PROVIDER_NAME: Authentik
              OPENID_PROVIDER_URL: "https://sso.${SECRET_DOMAIN}/application/o/open-web-ui/.well-known/openid-configuration"
              OPENID_REDIRECT_URI: "https://chat.${SECRET_DOMAIN}/oauth/oidc/callback"
              OAUTH_SCOPES: "openid email profile"
              # Search
              ENABLE_RAG_WEB_SEARCH: "true"
              RAG_WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: "http://searxng.default.svc.cluster.local:8080/search?q=<query>"
              # LLM API (via litellm proxy)
              ENABLE_OPENAI_API: "true"
              OPENAI_API_BASE_URLS: "http://litellm.ai.svc.cluster.local/v1"
              OPENAI_API_KEYS: "${LITELLM_MASTER_KEY}"
              # WebSocket
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: redis
              WEBSOCKET_REDIS_URL: "redis://dragonfly.data.svc.cluster.local:6379/7"
            envFrom:
              - secretRef:
                  name: open-webui-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                <<: *probes
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "chat.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        existingClaim: open-webui
        globalMounts:
          - path: /app/backend/data
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/backend/data/cache
          - path: /app/backend/open_webui/static
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
