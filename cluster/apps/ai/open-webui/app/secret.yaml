---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
metadata:
  name: open-webui-secret
  namespace: ai
type: Opaque
stringData:
  # Postgres Init (creates database and user)
  INIT_POSTGRES_DBNAME: open-webui
  INIT_POSTGRES_HOST: postgres-rw.data.svc.cluster.local
  INIT_POSTGRES_USER: open-webui
  INIT_POSTGRES_PASS: "${OPEN_WEBUI_POSTGRES_PASSWORD}"
  INIT_POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"
  # JWT secret for sessions/API tokens
  WEBUI_SECRET_KEY: "${OPEN_WEBUI_WEBUI_SECRET_KEY}"
  # OIDC / SSO (Authentik)
  OAUTH_CLIENT_ID: "${OPEN_WEBUI_OIDC_CLIENT_ID}"
  OAUTH_CLIENT_SECRET: "${OPEN_WEBUI_OIDC_CLIENT_SECRET}"
