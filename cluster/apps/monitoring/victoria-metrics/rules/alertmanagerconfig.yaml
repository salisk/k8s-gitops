---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy:
      - alertname
      - job
    groupInterval: 10m
    groupWait: 1m
    receiver: pushover
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      # - receiver: heartbeat
      #   groupInterval: 5m
      #   groupWait: 0s
      #   repeatInterval: 5m
      #   matchers:
      #     - name: alertname
      #       value: Watchdog
      #       matchType: =
      - receiver: pushover
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    # - name: heartbeat
    #   webhookConfigs:
    #     - httpConfig:
    #         bearerTokenSecret:
    #           name: &secret alertmanager-secret
    #           key: SPOODERMON_HEARTBEAT_TOKEN
    #       urlSecret:
    #         name: *secret
    #         key: SPOODERMON_HEARTBEAT_URL
    - name: pushover
      pushoverConfigs:
        - html: true
          message: |-
            {{- range .Alerts }}
              {{- if .Labels.kubernetes_node }}<b>Node:</b> {{ .Labels.kubernetes_node }}{{ end }}
              {{- if ne .Annotations.description "" }}
                {{- .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{- .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{- .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          sendResolved: true
          # sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}{{ if .CommonLabels.kubernetes_node }} on {{ .CommonLabels.kubernetes_node }}{{ end }}
          ttl: 86400s
          token:
            name: &secret alertmanager-secret
            key: ALERTMANAGER_PUSHOVER_TOKEN
          userKey:
            name: *secret
            key: PUSHOVER_USER_KEY
          urlTitle: View in Alertmanager
