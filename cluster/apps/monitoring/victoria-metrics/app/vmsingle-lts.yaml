---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmsingle_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmsingle-lts
  namespace: monitoring
spec:
  retentionPeriod: "730d"  # 2 years retention for long-term metrics
  replicaCount: 1
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
    storageClassName: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  extraArgs:
    maxLabelsPerTimeseries: "40"
    search.minStalenessInterval: 5m
  # Add service for scraping
  serviceSpec:
    spec:
      type: ClusterIP
      ports:
        - name: http
          port: 8428
          targetPort: 8428
