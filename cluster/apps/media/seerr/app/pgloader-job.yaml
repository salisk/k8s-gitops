---
apiVersion: batch/v1
kind: Job
metadata:
  name: seerr-pgloader-migration
  namespace: media
spec:
  suspend: true
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pgloader
          image: ghcr.io/ralgar/pgloader:pr-1531
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -z "$DB_PASS" ]; then
                echo "ERROR: DB_PASS is empty or not set"
                echo "Env dump (names only):"
                env | sort
                exit 1
              fi
              echo "DB_PASS is set (length: ${#DB_PASS})"
              pgloader \
                --with "quote identifiers" \
                --with "data only" \
                /app/config/db.sqlite3 \
                "postgresql://seerr:$${DB_PASS}@postgres-rw.data.svc.cluster.local:5432/seerr"
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: seerr-secret
                  key: DB_PASS
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: overseerr-config-v1
