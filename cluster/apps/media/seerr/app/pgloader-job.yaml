---
apiVersion: batch/v1
kind: Job
metadata:
  name: seerr-pgloader-migration
  namespace: media
spec:
  suspend: true
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pgloader
          image: ghcr.io/ralgar/pgloader:pr-1531
          command: ["/bin/sh", "-c"]
          args:
            - |
              DB_PASS="$(cat /secrets/DB_PASS)"
              if [ -z "$DB_PASS" ]; then
                echo "ERROR: DB_PASS is empty. Check seerr-secret contains the password."
                exit 1
              fi
              pgloader \
                --with "quote identifiers" \
                --with "data only" \
                /app/config/db.sqlite3 \
                "postgresql://seerr:${DB_PASS}@postgres-rw.data.svc.cluster.local:5432/seerr"
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: seerr-secret
                  key: DB_PASS
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: overseerr-config-v1
