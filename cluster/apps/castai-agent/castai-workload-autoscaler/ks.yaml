---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name castai-workload-autoscaler
  namespace: flux-system
spec:
  targetNamespace: castai-agent
  commonMetadata:
    labels:
      app.kubernetes.io/name: *name
  dependsOn:
    - name: castai-agent
  path: ./cluster/apps/castai-agent/castai-workload-autoscaler/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
